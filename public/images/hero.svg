<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 440" fill="none">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b448a"/>
      <stop offset="1" stop-color="#3a60bd"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#cdd8ee"/>
      <stop offset="1" stop-color="#9fb3d8"/>
    </linearGradient>
    <linearGradient id="rider" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- background circle -->
  <circle cx="260" cy="200" r="195" fill="url(#sky)" opacity="0.12"/>
  <circle cx="260" cy="200" r="150" fill="url(#sky)" opacity="0.10"/>

  <!-- sun -->
  <circle cx="395" cy="105" r="38" fill="#fcd34d" opacity="0.9"/>

  <!-- city buildings -->
  <g opacity="0.85">
    <rect x="70" y="150" width="48" height="150" rx="6" fill="#2a4aa0"/>
    <rect x="126" y="110" width="40" height="190" rx="6" fill="#1f3a82"/>
    <rect x="174" y="170" width="36" height="130" rx="6" fill="#3a60bd"/>
    <rect x="320" y="140" width="44" height="160" rx="6" fill="#2a4aa0"/>
    <rect x="372" y="175" width="38" height="125" rx="6" fill="#1f3a82"/>
    <rect x="418" y="200" width="34" height="100" rx="6" fill="#3a60bd"/>
    <!-- windows -->
    <g fill="#bcd0f5" opacity="0.65">
      <rect x="80" y="165" width="10" height="10" rx="2"/>
      <rect x="98" y="165" width="10" height="10" rx="2"/>
      <rect x="80" y="188" width="10" height="10" rx="2"/>
      <rect x="98" y="188" width="10" height="10" rx="2"/>
      <rect x="136" y="128" width="9" height="9" rx="2"/>
      <rect x="150" y="128" width="9" height="9" rx="2"/>
      <rect x="136" y="150" width="9" height="9" rx="2"/>
      <rect x="330" y="158" width="9" height="9" rx="2"/>
      <rect x="345" y="158" width="9" height="9" rx="2"/>
      <rect x="330" y="180" width="9" height="9" rx="2"/>
    </g>
  </g>

  <!-- road -->
  <rect x="40" y="300" width="440" height="58" rx="14" fill="url(#road)"/>
  <g stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-dasharray="22 18" opacity="0.9">
    <line x1="60" y1="329" x2="460" y2="329"/>
  </g>

  <!-- rider + scooter -->
  <g transform="translate(195 198)">
    <!-- shadow -->
    <ellipse cx="55" cy="135" rx="70" ry="10" fill="#15306b" opacity="0.18"/>

    <!-- scooter wheels -->
    <circle cx="14" cy="120" r="15" fill="#15306b"/>
    <circle cx="14" cy="120" r="6" fill="#cdd8ee"/>
    <circle cx="104" cy="120" r="15" fill="#15306b"/>
    <circle cx="104" cy="120" r="6" fill="#cdd8ee"/>
    <!-- deck -->
    <path d="M14 120 H104" stroke="#334155" stroke-width="7" stroke-linecap="round"/>
    <!-- stem -->
    <path d="M104 120 L104 52" stroke="#334155" stroke-width="7" stroke-linecap="round"/>
    <path d="M104 52 H124" stroke="#334155" stroke-width="7" stroke-linecap="round"/>

    <!-- body -->
    <path d="M62 116 L70 70 Q72 60 82 60 L96 60" stroke="url(#rider)" stroke-width="13" stroke-linecap="round" fill="none"/>
    <!-- arm -->
    <path d="M82 64 L112 56" stroke="url(#rider)" stroke-width="10" stroke-linecap="round"/>
    <!-- leg -->
    <path d="M64 112 L52 120" stroke="#0f766e" stroke-width="11" stroke-linecap="round"/>
    <!-- head + helmet -->
    <circle cx="86" cy="44" r="14" fill="#fcd9b8"/>
    <path d="M72 42 a14 14 0 0 1 28 0 z" fill="#1b448a"/>
    <rect x="73" y="41" width="26" height="5" rx="2" fill="#15306b"/>
  </g>
</svg>
